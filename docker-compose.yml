version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: iam
      POSTGRES_PASSWORD: iam_secret
      POSTGRES_DB: iam
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iam"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://iam:iam_secret@postgres:5432/iam
      JWT_SECRET: change-me-in-production-please-use-a-long-random-secret
      JWT_ACCESS_TTL_SECS: "900"
      JWT_REFRESH_TTL_SECS: "1209600"
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: info,iam_platform=debug
      APP_ENV: production
    ports: ["8080:8080"]

volumes:
  pgdata:
