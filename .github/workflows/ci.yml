name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: iam
          POSTGRES_PASSWORD: iam_secret
          POSTGRES_DB: iam
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U iam" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://iam:iam_secret@localhost:5432/iam
      JWT_SECRET: test-secret-for-ci-only-do-not-use-in-prod
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo build --release
      - run: cargo test
